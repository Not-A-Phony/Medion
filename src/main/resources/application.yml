spring:
  application:
    name: hardware-store-api
  
  # Virtual Threads Configuration
  threads:
    virtual:
      enabled: true

  # Database Configuration is handled by DatabaseConfig class to support Render URLs
  datasource:
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate # Flyway handles schema, hibernate just validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# JWT Configuration
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: 86400000 # 1 day in ms
      refresh-expiration: 604800000 # 7 days in ms

# Cloudinary Configuration
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

